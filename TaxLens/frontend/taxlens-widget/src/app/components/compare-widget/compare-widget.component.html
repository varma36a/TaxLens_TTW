<section class="compare-glass mb-4">
    <div class="compare-header">
        <div>
            <span class="compare-eyebrow">AI comparison</span>
            <h3>Compare Companies</h3>
        </div>
        <div class="compare-orb" aria-hidden="true"></div>
    </div>

    <div class="compare-grid">
        <label class="company-picker">
            <span>Company 1</span>
            <select class="form-select" [(ngModel)]="company1">
                <option value="">Select company</option>
                <option *ngFor="let c of companies" [value]="c.company_name">
                    {{c.company_name}}
                </option>
            </select>
        </label>

        <div class="versus-mark" aria-hidden="true">VS</div>

        <label class="company-picker">
            <span>Company 2</span>
            <select class="form-select" [(ngModel)]="company2">
                <option value="">Select company</option>
                <option *ngFor="let c of companies" [value]="c.company_name">
                    {{c.company_name}}
                </option>
            </select>
        </label>
    </div>

    <button class="compare-button" type="button" (click)="compare()">Compare</button>

    <div *ngIf="comparisonResult" class="comparison-result">
        <span>AI Comparison Summary</span>
        <p>{{comparisonResult.comparison_summary}}</p>
    </div>
</section>
